name: Deploy to GitHub Pages

# Runs every time you push to main.
#
# Firebase config is hardcoded directly in index.html and
# educator_control_panel.html (it's not sensitive — Firebase client config
# is protected by Database Rules, not by being secret). So this workflow now
# just publishes the repo contents as-is; no secret substitution needed.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
